<!DOCTYPE html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0"><!--控制网页在不同设备上的显示和缩放-->
        <meta name="author" content="Tydecent">
        <meta name="description" content="留言板 | 分享你的想法">
        
        <title>留言板 | 分享你的想法</title>

        <link href="style.css" rel="stylesheet" />
        <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.css"><!--外部图标字体库-->

        <script src="script.js"> </script>
        

    </head>
    <body>
        <div class="container">
            <header>
                <div class="logo">
                    <h1>留言板</h1>
                </div>
                <p class="tagline">分享你的想法，让世界听到你的声音</p>
            </header>
            
            <div class="content">
                <div class="form-container">
                    <h2><i class="fa-solid fa-pen-to-square"></i> 发布留言</h2>
                    <form id="messageForm">
                        <div class="form-group">
                            <label for="name">您的称呼（可选）</label>
                            <input type="text" id="name" class="form-control" placeholder="输入您的姓名">
                        </div>
                        
                        <div class="checkbox-group">
                            <input type="checkbox" id="anonymous">
                            <label for="anonymous">匿名发布</label>
                        </div>
                        
                        <div class="form-group">
                            <label for="message">留言内容</label>
                            <textarea id="message" class="form-control" placeholder="善语结善缘，恶语伤人心，拒绝网络暴力" required></textarea>
                        </div>
                        
                        <button type="submit" class="btn">发布留言 <i class="fa-solid fa-paper-plane-top"></i></button>

                        <p><br></p>
                        
                    </form>
                </div>

                <div class="messages-container">
                    <h2><i class="fa-solid fa-comments"></i> 最新留言</h2>
                    <div class="message-list" id="messageList">
                        <!-- 留言将动态加载到这里 -->
                    </div>
                    <p><i class="fa-solid fa-circle-info"></i> 称呼为“网站开发者”的留言是网站开发者留下的</p>
                </div>
                
            </div>
        </div>

</body>
</html>
